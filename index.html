<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranStream | Pure Reflection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #064e3b; --accent: #10b981; --bg: #0f172a;
            --card-bg: #1e293b; --text: #f8fafc; --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); line-height: 1.6; }

        header {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            padding: 1rem 5%; position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent); text-decoration: none; }
        .search-bar { flex: 0 1 400px; }
        .search-bar input {
            width: 100%; padding: 0.6rem 1rem; border-radius: 20px;
            border: 1px solid transparent; background: var(--card-bg); color: white; outline: none;
        }
        .search-bar input:focus { border-color: var(--accent); }

        .container { display: grid; grid-template-columns: 1fr 350px; gap: 2rem; padding: 2rem 5%; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }

        .video-wrapper {
            position: relative; padding-bottom: 56.25%; height: 0;
            border-radius: 15px; overflow: hidden; background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .video-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; border-bottom: 1px solid #334155; padding-bottom: 1rem;}
        
        .btn-group { display: flex; gap: 10px; }
        .btn { 
            padding: 8px 16px; border-radius: 20px; border: none; 
            background: var(--card-bg); color: white; cursor: pointer; font-weight: 600;
        }
        .btn:active { transform: scale(0.95); background: var(--accent); }

        .playlist { display: flex; flex-direction: column; gap: 1rem; }
        .playlist-item { 
            display: flex; gap: 12px; cursor: pointer; padding: 8px; border-radius: 10px; 
            background: rgba(255,255,255,0.03); transition: 0.2s;
        }
        .playlist-item:hover { background: var(--card-bg); }
        .playlist-item img { width: 120px; height: 68px; object-fit: cover; border-radius: 8px; }
        .item-detail h4 { font-size: 0.9rem; margin-bottom: 4px; }
        .item-detail p { font-size: 0.75rem; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">🌙 QuranStream</a>
        <div class="search-bar">
            <input type="text" id="videoSearch" placeholder="Search Surahs..." onkeyup="filterVideos()">
        </div>
        <button class="btn" style="background: var(--accent); color: var(--bg);">Sign In</button>
    </header>

    <div class="container">
        <div class="main-video-container">
            <div class="video-wrapper">
                <iframe id="main-player" src="https://youtu.be/nq-1zpWfiFQ?rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            
            <div class="video-info">
                <h1 id="video-title" style="margin-top:1rem;">Surah Ar-Rahman | Heart Soothing Recitation</h1>
                <div class="video-meta">
                    <p id="view-count" style="color:var(--text-dim)">1.2M views • 2026</p>
                    <div class="btn-group">
                        <button class="btn" onclick="alert('Liked!')">👍 <span id="like-count">45K</span></button>
                        <button class="btn" onclick="alert('Link Copied!')">↪️ Share</button>
                        <button class="btn" onclick="this.style.color='#10b981'; alert('Saved to Library')">💾 Save</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="playlist" id="videoList">
            <h3 style="margin-bottom: 0.5rem;">Up Next</h3>
            <div class="playlist-item" onclick="changeVideo('https://www.youtube.com/embed/S_mU8N_Wp3E', 'Surah Al-Mulk | Relaxing Recitation', '900K')">
                <img src="https://img.youtube.com/vi/S_mU8N_Wp3E/mqdefault.jpg">
                <div class="item-detail">
                    <h4>Surah Al-Mulk | Relaxing Recitation</h4>
                    <p>Mishary Rashid</p>
                </div>
            </div>
            <div class="playlist-item" onclick="changeVideo('https://www.youtube.com/embed/v9Xv7O_N78U', 'Surah Kahf - Friday Blessing', '2.1M')">
                <img src="https://img.youtube.com/vi/v9Xv7O_N78U/mqdefault.jpg">
                <div class="item-detail">
                    <h4>Surah Kahf - Friday Blessing</h4>
                    <p>Omar Hisham</p>
                </div>
            </div>
            <div class="playlist-item" onclick="changeVideo('https://www.youtube.com/embed/K8N8E7-7e-0', 'Surah Yaseen | Heart Touching', '1.5M')">
                <img src="https://img.youtube.com/vi/K8N8E7-7e-0/mqdefault.jpg">
                <div class="item-detail">
                    <h4>Surah Yaseen | Heart Touching</h4>
                    <p>Al-Afasy</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FUNCTION TO CHANGE VIDEOS
        function changeVideo(url, title, views) {
            document.getElementById('main-player').src = url + "?autoplay=1&rel=0";
            document.getElementById('video-title').innerText = title;
            document.getElementById('view-count').innerText = views + " views • 2026";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // SEARCH FUNCTION
        function filterVideos() {
            let input = document.getElementById('videoSearch').value.toLowerCase();
            let items = document.getElementsByClassName('playlist-item');
            
            for (let i = 0; i < items.length; i++) {
                let title = items[i].getElementsByTagName('h4')[0].innerText;
                if (title.toLowerCase().includes(input)) {
                    items[i].style.display = "flex";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
