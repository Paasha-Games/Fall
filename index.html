<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کاتەکانی بانگ | نوێژەکانم</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;500;800&display=swap');

        :root {
            --primary: #10b981;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header { text-align: center; margin-bottom: 30px; }
        
        select {
            background: #334155;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
            outline: none;
        }

        .next-prayer-card {
            background: linear-gradient(135deg, var(--primary), #059669);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .next-prayer-card h2 { margin: 0; font-size: 1.2rem; opacity: 0.9; }
        .next-prayer-card .time { font-size: 3rem; font-weight: 800; margin: 10px 0; }
        .next-prayer-card .countdown { font-size: 1rem; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 50px; display: inline-block; }

        .prayer-list { list-style: none; padding: 0; }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            transition: 0.3s;
        }
        .prayer-item.active {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid var(--accent);
        }
        .prayer-name { display: flex; align-items: center; gap: 15px; font-weight: 500; }
        .prayer-time { font-weight: 800; color: var(--accent); }

        .extra-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        .tool-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .tool-btn:hover { background: #475569; }

        #dhikr-area {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 15px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <select id="city-select">
            <option value="Erbil">هەولێر</option>
            <option value="Sulaymaniyah">سلێمانی</option>
            <option value="Duhok">دهۆک</option>
            <option value="Kirkuk">کەرکووک</option>
        </select>
        <div id="current-date">-- / -- / ----</div>
    </div>

    <div class="next-prayer-card">
        <h2 id="next-prayer-name">ماوە بۆ بانگی داهاتوو</h2>
        <div class="time" id="countdown-timer">00:00:00</div>
        <div class="countdown" id="next-prayer-title">دیاریکردن...</div>
    </div>

    <ul class="prayer-list" id="prayer-list">
        </ul>

    <div class="extra-tools">
        <button class="tool-btn" onclick="toggleDhikr()"><i class="fas fa-beads"></i> تەسبیح</button>
        <button class="tool-btn" onclick="alert('قیبلە بەلای ڕاستدایە (نزیکەی ٢١٥ پلە)')"><i class="fas fa-compass"></i> قیبلە</button>
    </div>

    <div id="dhikr-area">
        <p id="dhikr-text">سبحان الله</p>
        <h1 id="dhikr-count" style="font-size: 3rem; margin: 10px 0;">0</h1>
        <button class="tool-btn" style="width: 100%; background: var(--primary);" onclick="countDhikr()">زیکر بکە</button>
    </div>
</div>

<script>
    const citySelect = document.getElementById('city-select');
    const prayerList = document.getElementById('prayer-list');
    const countdownDisplay = document.getElementById('countdown-timer');
    const nextPrayerTitle = document.getElementById('next-prayer-title');

    let currentDhikrCount = 0;
    const prayerNamesKurdish = {
        Fajr: "بەیانی",
        Sunrise: "ڕۆژهەڵات",
        Dhuhr: "نیوەڕۆ",
        Asr: "عەسر",
        Maghrib: "مەغریب",
        Isha: "عیشا"
    };

    async function fetchPrayers() {
        const city = citySelect.value;
        const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Iraq&method=3`);
        const data = await response.json();
        const timings = data.data.timings;
        const date = data.data.date.readable;

        document.getElementById('current-date').innerText = date;
        displayPrayers(timings);
        updateNextPrayer(timings);
    }

    function displayPrayers(timings) {
        prayerList.innerHTML = '';
        const relevantPrayers = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
        
        relevantPrayers.forEach(p => {
            const li = document.createElement('li');
            li.className = 'prayer-item';
            li.innerHTML = `
                <div class="prayer-name">
                    <i class="far fa-clock"></i>
                    ${prayerNamesKurdish[p]}
                </div>
                <div class="prayer-time">${timings[p]}</div>
            `;
            prayerList.appendChild(li);
        });
    }

    function updateNextPrayer(timings) {
        const now = new Date();
        const prayers = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
        let nextP = null;
        let nextTime = null;

        for (let p of prayers) {
            const [h, m] = timings[p].split(':');
            const pDate = new Date();
            pDate.setHours(h, m, 0);

            if (pDate > now) {
                nextP = p;
                nextTime = pDate;
                break;
            }
        }

        if (!nextP) { // ئەگەر هەموو نوێژەکان ڕۆیشتبوون، هی سبەی بەیانی
            const [h, m] = timings['Fajr'].split(':');
            nextTime = new Date();
            nextTime.setDate(nextTime.getDate() + 1);
            nextTime.setHours(h, m, 0);
            nextP = 'Fajr';
        }

        setInterval(() => {
            const diff = nextTime - new Date();
            const hours = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            
            countdownDisplay.innerText = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            nextPrayerTitle.innerText = `بانگی ${prayerNamesKurdish[nextP]}`;
        }, 1000);
    }

    function toggleDhikr() {
        const area = document.getElementById('dhikr-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    function countDhikr() {
        currentDhikrCount++;
        document.getElementById('dhikr-count').innerText = currentDhikrCount;
    }

    citySelect.addEventListener('change', fetchPrayers);
    fetchPrayers();
</script>

</body>
</html>
